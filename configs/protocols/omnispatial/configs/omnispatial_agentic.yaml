benchmark: omnispatial_agentic
data_file: benchmark/data.jsonl
benchmark_root: benchmark
protocol_build:
  schema_version: provise.protocol.v1
  frozen: true
  agent_model: gpt-5.4
  parser_model: gpt-5.4
  validation_model: gpt-image-2
tasks:
  Dynamic_Reasoning:
    protocol: agentic_vlm_protocol
    prompt_variant: generated
    prompt: 'Given the source image and the question: {question}

      Create a single clean explanatory visual answer image that shows only the scene-based
      evidence needed to support the chosen option. Do not write the option label
      or any answer code. Instead, depict the inferred physical situation directly:
      for example, highlight the relevant object(s), show the key distance or extent
      being considered with large clear overlays, indicate the compared or resulting
      state if needed, and add short numeric annotations only when the question explicitly
      asks about a measurable quantity such as time, speed, or size. Keep the edit
      sparse, legible, and grounded in the source image.


      Candidate answers:

      {choices}'
    input:
      mode: single
    metric: accuracy
    metric_config: &id001 {}
    formal_evaluation: true
    protocol_config:
      generated_protocol_id: generated_omnispatial_agentic_Dynamic_Reasoning_vlm_fallback
      include_source_images: false
      parse_prompt: Read only what the generated image explicitly expresses. Identify
        the highlighted object(s), any shown distance/extent overlays, resulting state,
        and any short numeric annotation that appears in the image. Then choose the
        benchmark option whose text best matches that expressed visual evidence. Do
        not solve the original question from the source image alone; rely on the generated
        evidence and annotations.
      answer_format: 'one candidate option label from: A, B, C, D'
      invalid_conditions:
      - The generated image shows only an answer label, check mark, yes/no symbol,
        or other generic verdict code without grounded scene evidence.
      - The generated image lacks enough visible evidence to distinguish among choices,
        such as missing the relevant object, measurement overlay, resulting state,
        or numeric annotation when needed.
      - The parser bases its choice on the source image instead of the generated image’s
        expressed evidence.
      - The generated image contains dense prose or ambiguous tiny text that cannot
        be reliably read as the intended evidence.
      visual_strategy: other_spatial
      visual_evidence: Grounded scene objects plus explicit visualized measurement,
        comparison, or resulting state sufficient to distinguish one choice from the
        others.
      parser_observation: Observe which object is selected, what spatial extent or
        motion consequence is drawn, and any visible short number/unit annotation
        representing the inferred quantity; map that expressed evidence to the matching
        choice text.
      answer_recovery:
      - answer_schema: choice_selection
        visual_readout: Recover the answer only from the required task-grounded spatial
          evidence.
      label_role: none
      rationale: The task mixes open-ended dynamic and physical reasoning questions
        whose answers are multiple-choice labels but whose evidence may require estimating
        distance, time, speed, size, or possibility from scene semantics. No registered
        deterministic recipe or Parser Ops pipeline can preserve this heterogeneous
        choice-selection contract without solving the task inside the parser; a task-level
        visual-semantic readout is needed.
      metric: accuracy
      metric_config: *id001
  Perspective_Taking:
    protocol: agentic_vlm_protocol
    prompt_variant: generated
    prompt: 'Use the supplied image or ordered images to answer this spatial task:
      "{question}". Choices: {choices}. Produce one clean visual realization of the
      selected option''s actual spatial state, relation, action, or result. Do not
      write option letters, answer labels, or explanatory text. Preserve recognizable
      task-relevant objects. Output only the visual answer.'
    input:
      mode: single
    metric: accuracy
    metric_config: &id003 {}
    formal_evaluation: true
    protocol_config:
      generated_protocol_id: generated_omnispatial_agentic_Perspective_Taking_vlm_fallback
      include_source_images: false
      parse_prompt: Read only the concrete spatial evidence expressed in the generated
        visual response. Identify the marked objects, regions, arrows, path, measurement,
        correspondence, or generated state, then recover the answer in the benchmark's
        required format. Candidate choices may be used only to map that visible evidence
        to a label. Do not independently solve the original task from the source image
        and do not accept a bare answer label as evidence.
      answer_format: 'one candidate option label from: A, B, C, D'
      invalid_conditions:
      - no task-relevant spatial mark or generated state is visible
      - the visible evidence is ambiguous or contradicts itself
      - the response contains only an answer label or prose
      visual_strategy: other_spatial
      visual_evidence: selected egocentric spatial arrangement from the named person's
        perspective; viewer-centered placement of the referenced object in the correct
        left/right/front/rear position; clear depiction of indeterminate view only
        when the scene genuinely lacks enough information
      parser_observation: Read only the visible task-grounded selected egocentric
        spatial arrangement from the named person's perspective; viewer-centered placement
        of the referenced object in the correct left/right/front/rear position; clear
        depiction of indeterminate view only when the scene genuinely lacks enough
        information, then map that evidence to the required answer schema.
      answer_recovery:
      - answer_schema: choice_selection
        visual_readout: Recover the answer only from the required task-grounded spatial
          evidence.
      label_role: none
      rationale: 'The deterministic or fixed-model visual readout failed mechanical
        smoke checks: parse_success_rate, parser_agreement_rate, spatial_evidence_rate,
        metric_compatibility_rate'
      metric: accuracy
      metric_config: *id003
      fallback_preserved_generation: true
  Spatial_Interaction:
    protocol: agentic_vlm_protocol
    prompt_variant: generated
    prompt: 'Given the driving scene and the question: {question}

      Create a simple, clean visual answer image that depicts only the selected answer''s
      task-relevant driving state or road meaning. Do not write letters, words, checkmarks,
      X marks, or verdict symbols. For safety questions, show the concrete safe or
      unsafe spacing/interaction itself as a large, unambiguous driving scene edit
      or synthesized scene. For road-type questions, show the distinctive visible
      road configuration and access structure of the selected road type. Keep the
      composition sparse and focused on the decisive spatial evidence.


      Candidate answers:

      {choices}'
    input:
      mode: single
    metric: accuracy
    metric_config: &id005 {}
    formal_evaluation: true
    protocol_config:
      generated_protocol_id: generated_omnispatial_agentic_Spatial_Interaction_vlm_fallback
      include_source_images: false
      parse_prompt: Read only what the generated image depicts. Ignore the source
        image except as context for the generation task. Determine which answer choice
        text is best matched by the visible driving state, spacing, interaction, or
        road-type scene shown in the generated image. Output exactly one choice label.
      answer_format: 'one candidate option label from: A, B, C, D'
      invalid_conditions:
      - The image answers using only letters, words, checkmarks, X marks, traffic-light
        colors, or other generic verdict symbols.
      - The image merely highlights an object or region from the source without depicting
        the selected option's semantic driving state or road meaning.
      - The image is too similar to multiple options and lacks decisive spatial cues
        for a unique match.
      visual_strategy: other_spatial
      visual_evidence: A clearly depicted selected driving state, such as visibly
        safe or unsafe following distance, or a distinctive entered road configuration
        corresponding to one option's semantics.
      parser_observation: 'Inspect the generated image for concrete spatial evidence:
        vehicle spacing and relative motion context for safety questions, or structural
        road cues such as divided carriageway, ramps, barriers, controlled access,
        or merge configuration for road-type questions.'
      answer_recovery:
      - answer_schema: choice_selection
        visual_readout: Recover the answer only from the required task-grounded spatial
          evidence.
      label_role: none
      rationale: The task mixes open-ended driving semantics, safety judgments, and
        road-type recognition into a single choice-selection format. No deterministic
        recipe or parser-op plan can preserve the answer contract across these heterogeneous
        questions without the parser effectively solving the original task; a task-level
        visual-semantic readout is needed.
      metric: accuracy
      metric_config: *id005
  complex_logic__choice_selection__accuracy:
    protocol: agentic_vlm_protocol
    prompt_variant: generated
    prompt: 'Create a clean, sparse solution board for the problem shown in the source
      image and described by {question}. Re-express the key visual reasoning steps
      needed to solve it using large, legible diagrams, equations, counts, folds,
      or geometric constructions as appropriate to the specific problem type. Include
      the final selected option by reproducing the chosen option''s task-relevant
      content visibly on the board (for example the correct number, quantity, configuration,
      length expression, or resulting state), not by writing only its letter label.
      If useful, also show elimination marks or intermediate constructions grounded
      in the source figure. Keep the layout simple and high-contrast.


      Candidate answers:

      {choices}'
    input:
      mode: single
    metric: accuracy
    metric_config: &id007 {}
    formal_evaluation: true
    protocol_config:
      generated_protocol_id: generated_omnispatial_agentic_complex_logic__choice_selection__accuracy_vlm_fallback
      include_source_images: false
      parse_prompt: Read only the generated solution board. Determine which benchmark
        choice is selected by matching the visibly expressed final answer content
        on the board to the provided choice texts. Use the worked visual evidence,
        equations, counts, or constructed state shown in the generated image; do not
        solve the original source problem independently and do not rely on an isolated
        answer letter unless it is attached to matching task-relevant final content.
      answer_format: 'one candidate option label from: A, B, C, D'
      invalid_conditions:
      - The generated image shows only an answer code such as A/B/C/D, a checkmark,
        or a generic verdict without task-relevant final content.
      - The generated board lacks enough visible reasoning or final grounded result
        to uniquely match one choice text.
      - The final visible result conflicts internally across different parts of the
        board.
      - The image is too cluttered, tiny, or illegible for reliable matching of the
        expressed answer content.
      visual_strategy: other_spatial
      visual_evidence: A generated board containing explicit task-grounded reasoning
        artifacts such as counted valid cases, completed numeric pattern relations,
        or geometric constructions/measurements, plus a final visible answer content
        matching one choice text.
      parser_observation: 'Inspect the final worked result shown on the board: the
        counted total, resolved missing number, derived measurement/expression, or
        depicted final configuration, and map that visible result to the unique choice
        text.'
      answer_recovery:
      - answer_schema: choice_selection
        visual_readout: Recover the answer only from the required task-grounded spatial
          evidence.
      label_role: none
      rationale: Samples span heterogeneous visual logic problems (net folding, number
        pattern, geometry word/problem diagrams) with no single deterministic recipe
        or parser-ops contract that preserves the choice-selection answer across the
        task. A task-level visual reasoning parser is needed to read the generated
        worked visual evidence rather than answer codes.
      metric: accuracy
      metric_config: *id007
  complex_logic__structured_or_text__accuracy:
    protocol: agentic_vlm_protocol
    prompt_variant: generated
    prompt: 'Use the supplied source image or ordered images to produce one clear
      visual answer to this spatial task:

      {question}


      Candidate answers, when present:

      {choices}


      Express the answer through large, task-relevant visual evidence in the image
      itself. Use only the primitives that fit the task, such as object outlines,
      a region overlay, arrows between referenced objects, a path, measurement marks,
      correspondence marks, or a visibly rendered next spatial state. Preserve unrelated
      scene content. Do not merely print an answer label, option text, or prose explanation.'
    input:
      mode: single
    metric: accuracy
    metric_config: &id009 {}
    formal_evaluation: true
    protocol_config:
      generated_protocol_id: generated_omnispatial_agentic_complex_logic__structured_or_text__accuracy_vlm_fallback
      include_source_images: false
      parse_prompt: Read only the concrete spatial evidence expressed in the generated
        visual response. Identify the marked objects, regions, arrows, path, measurement,
        correspondence, or generated state, then recover the answer in the benchmark's
        required format. Candidate choices may be used only to map that visible evidence
        to a label. Do not independently solve the original task from the source image
        and do not accept a bare answer label as evidence.
      answer_format: choice
      invalid_conditions:
      - no task-relevant spatial mark or generated state is visible
      - the visible evidence is ambiguous or contradicts itself
      - the response contains only an answer label or prose
      visual_strategy: other_spatial
      visual_evidence: task-grounded object outlines, region overlays, arrows, paths,
        measurement marks, correspondence marks, or a visibly changed spatial state
      parser_observation: Read only the visible task-grounded task-grounded object
        outlines, region overlays, arrows, paths, measurement marks, correspondence
        marks, or a visibly changed spatial state, then map that evidence to the required
        answer schema.
      answer_recovery:
      - answer_schema: structured_or_text
        visual_readout: Recover the answer only from the required task-grounded spatial
          evidence.
      label_role: none
      rationale: 'No validated deterministic visual readout remained after protocol
        construction: fallback may not use a pure answer-code layout; fallback must
        require concrete task-grounded spatial evidence'
      metric: accuracy
      metric_config: *id009
