            $config: membership_min_fraction
            default: 0.03
          min_mask_pixels:
            $config: target_region_min_pixels
            default: 200
      output: relation_holds
  metric_contract:
    metric: accuracy
    config: {}
    formal_evaluation: true
  rationale: This is a single-image binary spatial perspective task. The relation_zone_boolean
    recipe matches the binary_boolean contract and avoids answer-code symbols by expressing
    subject, reference, and the valid perspective-dependent relation region geometrically.
- id: generated_perspective_choice_selection_accuracy_v2
  task: perspective__choice_selection__accuracy
  decision: build
  build_mode: recipe
  recipe: dual_anchor_relation
  visual_contract:
    recipe: dual_anchor_relation
    mode: edit_source
    primitives:
    - subject anchor
    - reference anchor
    parameters:
      relation_mode: horizontal
  generation_prompt: 'Solve the spatial relation in: "{question}". Keep the source
    image unchanged except for two thick outlines. Outline the subject named by the
    question in solid magenta (#FF00FF), and outline the reference object in solid
    cyan (#00FFFF). Use exactly one outline for each role. Do not write an answer
    label or explanatory text. Output only the annotated image.


    Candidate answers:

    {choices}'
  readout:
    recipe: dual_anchor_relation
    output_kind: choice_label
    pipeline:
      steps:
      - id: generated
        op: load_generated
      - id: source
        op: load_source
        params:
          index: 0
      - id: aligned
        op: align_to_reference
        inputs:
        - generated
        - source
        params:
          motion: euclidean
      - id: subject_generated_mask
        op: hsv_color_mask
        inputs:
        - aligned
        params:
          lower: &id017
          - 140
          - 70
          - 70
          upper: &id018
          - 179
          - 255
          - 255
      - id: subject_source_mask
        op: hsv_color_mask
        inputs:
        - source
        params:
          lower: *id017
          upper: *id018
      - id: subject_source_guard
        op: morphology
        inputs:
        - subject_source_mask
        params:
          operation: dilate
          kernel_size: 5
          iterations: 1
      - id: subject_novel_mask
        op: mask_subtract
        inputs:
        - subject_generated_mask
        - subject_source_guard
      - id: subject_clean_mask
        op: morphology
        inputs:
        - subject_novel_mask
        params:
          operation: close
          kernel_size: 5
          iterations: 1
      - id: subject_components
        op: connected_components
        inputs:
        - subject_clean_mask
      - id: subject_candidates
        op: filter_components
        inputs:
        - subject_components
        params:
          min_area: 30
      - id: subject_component
        op: select_largest
        inputs:
        - subject_candidates
        params:
          ambiguity_ratio: 1.0
      - id: reference_generated_mask
        op: hsv_color_mask
        inputs:
        - aligned
        params:
          lower: &id019
          - 80
          - 70
          - 70
          upper: &id020
          - 100
          - 255
          - 255
      - id: reference_source_mask
        op: hsv_color_mask
        inputs:
        - source
        params:
          lower: *id019
          upper: *id020
      - id: reference_source_guard
        op: morphology
        inputs:
        - reference_source_mask
        params:
          operation: dilate
          kernel_size: 5
          iterations: 1
      - id: reference_novel_mask
        op: mask_subtract
        inputs:
        - reference_generated_mask
        - reference_source_guard
      - id: reference_clean_mask
        op: morphology
        inputs:
        - reference_novel_mask
        params:
          operation: close
          kernel_size: 5
          iterations: 1
      - id: reference_components
        op: connected_components
        inputs:
        - reference_clean_mask
      - id: reference_candidates
        op: filter_components
        inputs:
        - reference_components
        params:
          min_area: 30
      - id: reference_component
        op: select_largest
        inputs:
        - reference_candidates
        params:
          ambiguity_ratio: 1.0
      - id: relation
        op: component_relation
        inputs:
        - subject_component
        - reference_component
        params:
          mode:
            $config: relation_mode
            default: horizontal
          overlap_threshold:
            $config: overlap_threshold
            default: 0.25
          near_threshold:
            $config: near_threshold
            default: 0.2
      - id: choice
        op: map_relation_to_choice
        inputs:
        - relation
      output: choice
  metric_contract:
    metric: accuracy
    config: {}
    formal_evaluation: true
  rationale: This is a single-image left/right perspective choice task. A deterministic
    relation recipe can preserve the choice contract by grounding the person/agent
    and referenced object, then mapping recovered geometry to the matching textual
    choice.
