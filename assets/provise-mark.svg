<svg xmlns="http://www.w3.org/2000/svg" viewBox="2 9 88 54" role="img" aria-labelledby="title desc">
  <title id="title">ProVisE logo</title>
  <desc id="desc">A refined visual eye revealing a structured three-dimensional scene through its optical center.</desc>

  <defs>
    <linearGradient id="eye-field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF6F4"/>
    </linearGradient>
    <linearGradient id="scene-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#477F98"/>
      <stop offset="1" stop-color="#285B78"/>
    </linearGradient>
    <linearGradient id="scene-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#244E6C"/>
      <stop offset="1" stop-color="#102F4D"/>
    </linearGradient>
    <radialGradient id="iris-rim" cx="38%" cy="30%" r="72%">
      <stop offset="0" stop-color="#3B8582"/>
      <stop offset=".62" stop-color="#176B6A"/>
      <stop offset="1" stop-color="#0D4F52"/>
    </radialGradient>
    <clipPath id="scene-clip">
      <circle cx="46" cy="34" r="14.35"/>
    </clipPath>
  </defs>

  <!-- A shaped visual field, with a stronger upper lid and quieter lower lid. -->
  <path d="M5.5 34C15.4 19.9 29.1 12.7 46 12.7S76.6 19.9 86.5 34C76.6 48.1 62.9 55.3 46 55.3S15.4 48.1 5.5 34Z"
        fill="url(#eye-field)" stroke="#116765" stroke-width="3.4" stroke-linejoin="round"/>
  <path d="M10.2 39.2C19.7 50 31.5 55.3 46 55.3S72.3 50 81.8 39.2"
        fill="none" stroke="#2D5D86" stroke-width="1.8" stroke-linecap="round" opacity=".92"/>
  <path d="M9.7 34c6.5-4.9 13.4-8.1 20.8-9.8M82.3 34c-6.5-4.9-13.4-8.1-20.8-9.8"
        fill="none" stroke="#A9CBC5" stroke-width="1.05" stroke-linecap="round" opacity=".58"/>

  <!-- A restrained optical rim frames the miniature spatial scene. -->
  <circle cx="46" cy="34" r="16.7" fill="url(#iris-rim)" stroke="#FFFFFF" stroke-width="1.8"/>
  <circle cx="46" cy="34" r="14.65" fill="none" stroke="#C3DEDA" stroke-width=".72" opacity=".84"/>

  <!-- The optical center contains a solid miniature spatial world. -->
  <g clip-path="url(#scene-clip)" stroke-linejoin="round">
    <rect x="31" y="19" width="30" height="30" fill="#285B78"/>

    <!-- Three architectural planes create a room through mass and occlusion. -->
    <path d="M31 23.5 46 16v14.2L31 38.8Z" fill="#427E91"/>
    <path d="M46 16 61 23.5v15.3l-15-8.6Z" fill="#326A82"/>
    <path d="m31 38.8 15-8.6 15 8.6L46 49.3Z" fill="#173E5C"/>
    <path d="M31 38.8 46 30.2 61 38.8" fill="none" stroke="#A9CDCB" stroke-width=".78" opacity=".58"/>
    <path d="M36 21v14.9M56 21v14.9" fill="none" stroke="#B7D5D5" stroke-width=".55" opacity=".24"/>
    <path d="m35.1 42.6 10.9-6.3 10.9 6.3" fill="none" stroke="#8AB3B6" stroke-width=".55" opacity=".34"/>

    <!-- A long foreground plinth leads the eye into the room. -->
    <path d="m32.8 40.2 9.8-5.6 10.1 5.8-9.8 5.7Z" fill="#79ADA4"/>
    <path d="m32.8 40.2 10.1 5.9v3.3l-10.1-5.8Z" fill="#315F75"/>
    <path d="m42.9 46.1 9.8-5.7v3.3l-9.8 5.7Z" fill="#214B68"/>
    <path d="m37.1 42.7 5.5-3.2 5.8 3.3-5.6 3.2Z" fill="#A8CBC4" opacity=".48"/>

    <!-- The asymmetric hero volume anchors the composition. -->
    <path d="m42.7 29.9 5.8-3.4 5.5 3.2-5.8 3.4Z" fill="#F0F5F3"/>
    <path d="m42.7 29.9 5.5 3.2v7.7l-5.5-3.2Z" fill="#78ADA4"/>
    <path d="m48.2 33.1 5.8-3.4v7.7l-5.8 3.4Z" fill="#C65A4C"/>
    <path d="M48.5 26.5v6.6M42.7 29.9l5.5 3.2 5.8-3.4"
          fill="none" stroke="#FFFFFF" stroke-width=".62" opacity=".72"/>
    <path d="m44 41 4.2 2.4 6-3.5-4.2-2.4Z" fill="#0B2943" opacity=".42"/>

    <!-- A slim distant volume supplies scale and foreground-background rhythm. -->
    <path d="m34 28.8 3.1-1.8 2.9 1.7-3.1 1.8Z" fill="#DCEBE8"/>
    <path d="m34 28.8 2.9 1.7v5.1L34 34Z" fill="#669B94"/>
    <path d="m36.9 30.5 3.1-1.8v5.1l-3.1 1.8Z" fill="#29556D"/>
    <path d="m34.8 35.2 2.2 1.3 3.5-2-2.3-1.3Z" fill="#102F4A" opacity=".38"/>
  </g>

  <!-- Lens reflections make the mark read as optical at small scale. -->
  <path d="M35.4 23.7c2.2-2.1 4.9-3.3 7.8-3.7"
        fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity=".78"/>
</svg>
