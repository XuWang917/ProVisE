name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "assets/**"
      - "docs/**"
      - ".env.example"
      - ".gitignore"
      - "CITATION.cff"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "assets/**"
      - "docs/**"
      - ".env.example"
      - ".gitignore"
      - "CITATION.cff"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[benchmarks,dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Smoke test
        run: bash scripts/smoke_test.sh

  package:
    name: Wheel install
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install build
          python -m build
      - name: Install wheel in isolation
        run: |
          python -m venv "$RUNNER_TEMP/provise-wheel"
          "$RUNNER_TEMP/provise-wheel/bin/pip" install dist/*.whl
      - name: Verify installed resources and CLI
        working-directory: ${{ runner.temp }}
        run: |
          "$RUNNER_TEMP/provise-wheel/bin/python" -c "from provise.paths import benchmark_suite_path, protocol_spec_dir, source_root; assert source_root() is None; assert benchmark_suite_path().is_file(); assert (protocol_spec_dir() / 'agentic_point_marker.yaml').is_file()"
          "$RUNNER_TEMP/provise-wheel/bin/provise" --help
          mkdir -p "$RUNNER_TEMP/empty-benchmarks"
          "$RUNNER_TEMP/provise-wheel/bin/provise" suite --benchmark-root "$RUNNER_TEMP/empty-benchmarks" --dry-run --output "$RUNNER_TEMP/suite-smoke"
